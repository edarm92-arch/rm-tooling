# rm-policy.yaml — rm-tooling's own policy (the validator validates itself).
# Profile: static. rm-tooling is a standalone CLI with no persistent state and
# no network surfaces, so it carries only the universal base + file limits +
# prompt gate + a layer-agnostic cycle check. See ADR/0001-perfil-static.md.

version: "0.1.0"
project: "rm-tooling"

extends: static
capabilities: {}          # a standalone CLI — no store, no sign-in, no surfaces

enforcement:
  mode: "warning"
  require_profile_adr: true
  capability_mismatch_fails: true
  adr_glob: "ADR/*perfil*.md"
  baseline_ratchet:
    enabled: false

modularity:
  code_file_lines: { soft: 300, hard: 500 }
  context_file_lines: { hard: 500 }

# Only the layer-agnostic cycle check is on; no layering_patterns are declared
# because no layer-based fitness function is enabled (see PARTE 4 of the spec).
fitness_functions:
  no_circular_dependencies: true

prompt_gate:
  required_sections: []
  paths: []

security:
  no_secrets_in_repo: true
  dependency_scan_in_ci: true

# Note: rm-tooling is itself a scanner, so its own detection-pattern files would
# self-trigger capability inference. That is handled by an INTERNAL, versioned
# deny-list in rm_validate/inference.py (applied only to rm-tooling itself) — not
# by an exclusion key in this file. Inference exclusion is deliberately not
# configurable: it would let any repo silence the capability-mismatch lock.
