name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit

      - name: Lint (ruff)
        run: ruff check rm_validate tests

      - name: Type check (mypy)
        run: mypy rm_validate

      - name: Tests (pytest)
        run: pytest -q

      - name: Dependency audit (supply chain)
        # No `|| true`: the audit must be able to fail the build. If a known,
        # accepted vuln must be tolerated, ignore it explicitly and comment why:
        #   pip-audit --ignore-vuln GHSA-xxxx-xxxx-xxxx
        run: pip-audit

      - name: Self-check (rm-validate check .)
        run: python -m rm_validate check .
